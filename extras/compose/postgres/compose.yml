name: gebrauchtwagen

services:
  app:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: gebrauchtwagen-ts:latest
    container_name: gebrauchtwagen-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gebrauchtwagen:gebrauchtwagen@db:5432/gebrauchtwagen?schema=gebrauchtwagen
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r = await fetch('http://127.0.0.1:3000/health/liveness'); process.exit(r.ok ? 0 : 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    stop_signal: SIGINT

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: gebrauchtwagen-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command: ["start-dev", "--http-port=8080"]
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"

  db:
    image: postgres:17
    container_name: gebrauchtwagen-db
    environment:
      POSTGRES_DB: gebrauchtwagen
      POSTGRES_USER: gebrauchtwagen
      POSTGRES_PASSWORD: gebrauchtwagen
    volumes:
      - ./init:/init:ro
      - ./init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gebrauchtwagen -d gebrauchtwagen"]
      interval: 10s
      timeout: 5s
      retries: 5
