name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun prisma generate
        env:
          DATABASE_URL: postgresql://gebrauchtwagen:gebrauchtwagen@localhost:5432/gebrauchtwagen?schema=gebrauchtwagen

      - name: TypeScript
        run: bun run tsc

      - name: ESLint
        run: bun run eslint

      - name: Prettier
        run: bun run prettier:check

      - name: Tests
        run: bun run test
